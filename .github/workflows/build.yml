name: Build APK
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
 
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
 
      - name: Install dependencies
        run: npm install --legacy-peer-deps
 
      - name: Build APK
        run: EAS_NO_VCS=1 eas build --platform android --profile preview --non-interactive
 
      - name: Get APK URL
        run: echo "✅ Build complete! Check https://expo.dev for your APK download link."
